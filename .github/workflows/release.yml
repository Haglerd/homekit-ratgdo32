name: Release

on:
  release:
     types: [published]
  # Allow auto-sync-upstream.yml (and humans) to dispatch a build manually.
  # GITHUB_TOKEN-fired release events do NOT trigger workflows, so the
  # auto-sync workflow tags a release and then dispatches this build.
  workflow_dispatch:

permissions:
  actions: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            submodules: true

      - name: Tag
        id: tag
        uses: JinoArch/get-latest-tag@latest

      - name: Update version on manifest.json
        uses: amochkin/action-json@v1
        id: write_version
        with:
          mode: write
          file: docs/manifest.json
          property: version
          value: ${{ steps.tag.outputs.latestTag }}
          value_type: string

      - name: Update firmware/*.bootloader.bin version on manifest.json
        uses: amochkin/action-json@v1
        id: builds_parts_path_0
        with:
          mode: write
          file: docs/manifest.json
          property: builds.0.parts.0.path
          value: firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.bootloader.bin
          value_type: string

      - name: Update firmware/*.partitions.bin version on manifest.json
        uses: amochkin/action-json@v1
        id: builds_parts_path_1
        with:
          mode: write
          file: docs/manifest.json
          property: builds.0.parts.1.path
          value: firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.partitions.bin
          value_type: string

      - name: Update firmware/*.bin version on manifest.json
        uses: amochkin/action-json@v1
        id: builds_parts_path_3
        with:
          mode: write
          file: docs/manifest.json
          property: builds.0.parts.3.path
          value: firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.bin
          value_type: string
          
      - name: Output created (or overwritten) manifest.json
        run: cat docs/manifest.json
        shell: bash
        
      - name: Output read value of 'version' & `parts` property
        run: echo ${{ steps.write_version.outputs.value }} ${{ steps.builds_parts_path_0.outputs.value }} ${{ steps.builds_parts_path_1.outputs.value }} ${{ steps.builds_parts_path_3.outputs.value }}
        shell: bash

      - name: Attach manifest.json
        uses: AButler/upload-release-assets@v3.0
        with:
          files: "/home/runner/work/homekit-ratgdo32/homekit-ratgdo32/docs/manifest.json"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ steps.tag.outputs.latestTag }}

      - name: Commit updated manifest.json to docs/
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the action-json edits before we move HEAD off the release tag
          cp docs/manifest.json /tmp/manifest.json
          git fetch origin main
          # Force-reset working copy to origin/main, discarding the release-tag
          # checkout. Any local mods to docs/manifest.json are intentionally lost
          # (we'll restore the desired content from /tmp on the next line).
          git checkout -B main origin/main
          cp /tmp/manifest.json docs/manifest.json
          if ! git diff --quiet docs/manifest.json; then
            git add docs/manifest.json
            git commit -m "Update manifest.json for ${{ steps.tag.outputs.latestTag }}"
            git push origin main
          else
            echo "manifest.json unchanged on main, skipping commit"
          fi
        shell: bash

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
  
      - name: Install PlatformIO Core
        run: |
            pip install --upgrade pip
            pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: pio run -e ratgdo_esp32dev

      - name : md5sum Firmware.bin
        run: |
          cd .pio/build/ratgdo_esp32dev
          md5sum firmware.bin | awk '{print $1}' > firmware.md5

      - name: Rename Firmware Files
        run: |
          mv .pio/build/ratgdo_esp32dev/firmware.bin .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.bin
          mv .pio/build/ratgdo_esp32dev/bootloader.bin .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.bootloader.bin
          mv .pio/build/ratgdo_esp32dev/partitions.bin .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.partitions.bin
          mv .pio/build/ratgdo_esp32dev/firmware.elf .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.elf
          mv .pio/build/ratgdo_esp32dev/firmware.md5 .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.md5

      # Attach all 5 firmware artifacts to the GitHub Release in one
       # batch — single API call, fewer chances to hit rule-eval timeouts.
      - name: Attach all firmware artifacts to release
        uses: AButler/upload-release-assets@v3.0
        with:
          files: ".pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.bin;.pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.bootloader.bin;.pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.partitions.bin;.pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.md5;.pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.elf"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ steps.tag.outputs.latestTag }}

      # The previous workflow ran 5 separate `wow-actions/download-upload`
      # steps (each one a Contents-API commit per binary). Those failed
      # under branch protection: the Contents API path triggers rule
      # validation that times out with "Unable to validate Block force
      # pushes / Restrict deletions" errors even though the commit
      # itself wouldn't violate any rule. Replaced with one direct
      # git-push step (same pattern as the manifest.json commit above
      # which works fine), and bundled into a SINGLE commit so the
      # release contributes one entry to history instead of 5.
      - name: Commit firmware bins to docs/firmware/
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stash the built firmware files before resetting HEAD — the
          # earlier action-json + manifest-commit steps left
          # docs/manifest.json modified in-tree, which makes a plain
          # `git checkout` refuse with "local changes would be
          # overwritten." -fB force-checkout is safe here because
          # origin/main already has the same manifest update from the
          # prior step in this same job.
          mkdir -p /tmp/fwbins
          cp .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.bin /tmp/fwbins/
          cp .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.bootloader.bin /tmp/fwbins/
          cp .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.partitions.bin /tmp/fwbins/
          cp .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.md5 /tmp/fwbins/
          cp .pio/build/ratgdo_esp32dev/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.elf /tmp/fwbins/
          git fetch origin main
          # -f discards uncommitted in-tree edits (the manifest.json
          # bump that's already on origin/main from the earlier step).
          # Without -f this exited 1 with "local changes would be
          # overwritten" and continue-on-error swallowed it silently —
          # which left docs/firmware/ stale by one release on every
          # build (v18 and v19 both shipped without bins committed).
          git checkout -fB main origin/main
          mkdir -p docs/firmware
          cp /tmp/fwbins/* docs/firmware/
          git add docs/firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.bin \
                  docs/firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.bootloader.bin \
                  docs/firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.partitions.bin \
                  docs/firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.firmware.md5 \
                  docs/firmware/homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.elf
          if ! git diff --cached --quiet; then
            git commit -m "Upload firmware bins for ${{ steps.tag.outputs.latestTag }}"
            git push origin main
          else
            echo "firmware bins already present on main, skipping commit"
          fi
        shell: bash

      # Keep the .elf as a workflow artifact for crash backtrace decoding
      # (addr2line consumers). Not on the release because elf files are
      # multi-MB and people don't usually want them — they're just
      # uploaded to docs/firmware/ for advanced debugging.
      - name: Upload firmware.elf as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: homekit-ratgdo32-${{ steps.tag.outputs.latestTag }}.elf
          path: |
            .pio/build/ratgdo_esp32dev/*.elf

      # Discord webhook notification stripped — fork doesn't have the
      # upstream's DISCORD_WEBHOOK_URL secret. Add back via repo settings
      # if you want release announcements posted somewhere.
